<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>離婚事件 受任前ヒアリング支援ツール｜チェックリスト・聴取事項・請求書面自動生成</title>
<style>
  :root{
    --navy:#0f2c4c;
    --blue:#1c6dd0;
    --accent:#e8852b;
    --accent-dark:#cf6f18;
    --bg:#f5f7fa;
    --text:#26303a;
    --muted:#5f6b78;
    --line:#e2e8f0;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;color:var(--text);line-height:1.7;background:var(--bg);-webkit-font-smoothing:antialiased}
  .wrap{max-width:1080px;margin:0 auto;padding:24px 20px 80px}
  header{background:var(--navy);color:#fff;padding:22px 0}
  header .wrap{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
  header h1{font-size:1.25rem;font-weight:800}
  header p{font-size:.78rem;color:#cfe0f2}
  h2{font-size:1.05rem;color:var(--navy);font-weight:800;margin-bottom:14px;border-left:5px solid var(--accent);padding-left:10px}
  .card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:24px;margin-bottom:22px;box-shadow:0 2px 10px rgba(15,44,76,.05)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:760px){.grid2{grid-template-columns:1fr}}
  label.field{display:block;font-size:.82rem;font-weight:700;color:var(--muted);margin-bottom:4px}
  input[type=text],input[type=date],input[type=number],select,textarea{
    width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:6px;font-size:.92rem;font-family:inherit;background:#fff
  }
  .field-wrap{margin-bottom:14px}
  fieldset{border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin-bottom:14px}
  legend{font-weight:800;color:var(--navy);font-size:.88rem;padding:0 6px}
  .opt-row{display:grid;grid-template-columns:repeat(2,1fr);gap:8px 18px}
  @media(max-width:760px){.opt-row{grid-template-columns:1fr}}
  .opt{display:flex;align-items:center;gap:8px;font-size:.9rem}
  .opt input{width:auto}
  .sub-detail{margin-top:8px;padding:10px 12px;background:var(--bg);border-radius:8px;display:none}
  .sub-detail.show{display:block}
  .btn{display:inline-block;border:none;border-radius:8px;font-weight:700;text-align:center;cursor:pointer;padding:13px 28px;font-size:1rem}
  .btn-accent{background:var(--accent);color:#fff}
  .btn-accent:hover{background:var(--accent-dark)}
  .btn-outline{background:#fff;color:var(--navy);border:1px solid var(--navy)}
  .btn-row{display:flex;gap:12px;justify-content:center;margin:28px 0;flex-wrap:wrap}
  #result{display:none}
  .result-section{margin-bottom:24px}
  .result-section h3{font-size:.95rem;color:var(--blue);font-weight:800;margin-bottom:8px}
  ul.checklist{list-style:none}
  ul.checklist li{position:relative;padding:6px 0 6px 28px;font-size:.92rem;border-bottom:1px dashed var(--line)}
  ul.checklist li::before{content:"☐";position:absolute;left:0;top:6px;color:var(--blue);font-size:1.1rem}
  ul.qa{list-style:none}
  ul.qa li{position:relative;padding:7px 0 7px 22px;font-size:.92rem;border-bottom:1px dashed var(--line)}
  ul.qa li::before{content:"Q.";position:absolute;left:0;top:7px;color:var(--accent);font-weight:800;font-size:.85rem}
  .tag-cat{display:inline-block;background:var(--blue);color:#fff;font-size:.68rem;padding:2px 8px;border-radius:10px;margin-right:8px;vertical-align:middle}
  table.points{width:100%;border-collapse:collapse;font-size:.88rem}
  table.points th,table.points td{border:1px solid var(--line);padding:8px 10px;text-align:left;vertical-align:top}
  table.points th{background:var(--bg);color:var(--navy);font-weight:800;width:9.5em}
  table.points td.status-claim{color:var(--accent-dark);font-weight:700}
  table.points td.status-na{color:#9aa6b2}
  textarea#letterOut,textarea#memoOut{width:100%;min-height:420px;font-size:.86rem;line-height:1.9;padding:18px;border:1px solid var(--line);border-radius:8px;white-space:pre-wrap}
  @media print{
    header,.btn-row,.card.input-card{display:none}
    body{background:#fff}
    .card{box-shadow:none;border:1px solid #999}
  }
</style>
</head>
<body>

<header>
  <div class="wrap">
    <div>
      <h1>離婚事件 受任前ヒアリング支援ツール</h1>
      <p>依頼者の前情報・意向を入力 → 7項目の整理、必要書類・聴取事項、法的見通しメモ、受任通知書面を自動生成</p>
    </div>
  </div>
</header>

<div class="wrap">

  <div class="card input-card">
    <h2>1. 基本情報</h2>
    <div class="grid2">
      <div class="field-wrap">
        <label class="field">依頼者氏名</label>
        <input type="text" id="clientName" placeholder="例）甲野花子">
      </div>
      <div class="field-wrap">
        <label class="field">相手方氏名</label>
        <input type="text" id="spouseName" placeholder="例）甲野太郎">
      </div>
      <div class="field-wrap">
        <label class="field">婚姻日</label>
        <input type="date" id="marriageDate">
      </div>
      <div class="field-wrap">
        <label class="field">別居の有無</label>
        <select id="separation">
          <option value="none">同居中</option>
          <option value="separated">別居中</option>
        </select>
      </div>
      <div class="field-wrap" id="separationDateWrap" style="display:none">
        <label class="field">別居開始日</label>
        <input type="date" id="separationDate">
      </div>
      <div class="field-wrap">
        <label class="field">未成年の子の有無</label>
        <select id="hasChildren">
          <option value="no">なし</option>
          <option value="yes">あり</option>
        </select>
      </div>
      <div class="field-wrap" id="childrenCountWrap" style="display:none">
        <label class="field">子の人数</label>
        <input type="number" id="childrenCount" min="1" value="1">
      </div>
    </div>

    <h2 style="margin-top:8px">2. 争点・事情チェック</h2>

    <fieldset>
      <legend>離婚原因・事情</legend>
      <div class="opt-row">
        <label class="opt"><input type="checkbox" data-issue="infidelity"> 不貞行為（浮気・不倫）の疑い</label>
        <label class="opt"><input type="checkbox" data-issue="dv"> DV・モラルハラスメント</label>
        <label class="opt"><input type="checkbox" data-issue="abandonment"> 悪意の遺棄（生活費不払い・家出等）</label>
        <label class="opt"><input type="checkbox" data-issue="personality"> 性格の不一致・価値観の相違</label>
        <label class="opt"><input type="checkbox" data-issue="addiction"> 暴力・ギャンブル・アルコール等の問題行動</label>
        <label class="opt"><input type="checkbox" data-issue="mental"> 強度の精神病・その他重大事由</label>
      </div>
    </fieldset>

    <fieldset>
      <legend>子に関する事項</legend>
      <div class="opt-row">
        <label class="opt"><input type="checkbox" data-issue="custody"> 親権を争う可能性</label>
        <label class="opt"><input type="checkbox" data-issue="visitation"> 面会交流について調整が必要</label>
        <label class="opt"><input type="checkbox" data-issue="support"> 養育費の取り決めが必要</label>
      </div>
    </fieldset>

    <fieldset>
      <legend>財産・お金に関する事項</legend>
      <div class="opt-row">
        <label class="opt"><input type="checkbox" data-issue="realestate"> 不動産（自宅等）を所有</label>
        <label class="opt"><input type="checkbox" data-issue="savings"> 預貯金・証券等の資産あり</label>
        <label class="opt"><input type="checkbox" data-issue="debt"> 夫婦の債務（ローン・借金）あり</label>
        <label class="opt"><input type="checkbox" data-issue="business"> 自営業・会社経営に関する資産あり</label>
        <label class="opt"><input type="checkbox" data-issue="pension"> 年金分割の希望</label>
        <label class="opt"><input type="checkbox" data-issue="alimony"> 慰謝料を請求したい</label>
      </div>
    </fieldset>

    <fieldset>
      <legend>進め方・その他</legend>
      <div class="opt-row">
        <label class="opt"><input type="checkbox" data-issue="negotiation"> まずは協議で進めたい</label>
        <label class="opt"><input type="checkbox" data-issue="mediation"> 調停を予定・検討している</label>
        <label class="opt"><input type="checkbox" data-issue="litigation"> 訴訟（裁判）も視野に入れている</label>
        <label class="opt"><input type="checkbox" data-issue="urgent"> 身の安全等、緊急対応が必要</label>
      </div>
    </fieldset>

    <h2 style="margin-top:8px">3. 請求内容・受任通知の送付先情報（書面用）</h2>
    <div class="grid2">
      <div class="field-wrap">
        <label class="field">相手方の住所（送付先）</label>
        <input type="text" id="spouseAddress" placeholder="例）東京都○○区○○1-2-3">
      </div>
      <div class="field-wrap">
        <label class="field">回答期限（本書面到達後・日数）</label>
        <input type="number" id="replyDays" value="14" min="1">
      </div>
      <div class="field-wrap">
        <label class="field">婚姻費用の希望額（月額・任意）</label>
        <input type="text" id="livingExpenseAmount" placeholder="例）15万円">
      </div>
      <div class="field-wrap">
        <label class="field">養育費の希望額（月額・任意）</label>
        <input type="text" id="childSupportAmount" placeholder="例）6万円">
      </div>
      <div class="field-wrap">
        <label class="field">慰謝料の希望額（任意）</label>
        <input type="text" id="alimonyAmount" placeholder="例）200万円">
      </div>
      <div class="field-wrap">
        <label class="field">財産分与の希望（任意・概要）</label>
        <input type="text" id="propertyDivisionNote" placeholder="例）自宅は売却し折半">
      </div>
      <div class="field-wrap">
        <label class="field">事務所名</label>
        <input type="text" id="firmName" placeholder="例）○○法律事務所">
      </div>
      <div class="field-wrap">
        <label class="field">担当弁護士名</label>
        <input type="text" id="lawyerName" placeholder="例）弁護士 ○○ ○○">
      </div>
      <div class="field-wrap">
        <label class="field">事務所連絡先（電話・FAX等）</label>
        <input type="text" id="firmContact" placeholder="例）TEL 03-0000-0000／FAX 03-0000-0001">
      </div>
      <div class="field-wrap">
        <label class="field">事務所住所</label>
        <input type="text" id="firmAddress" placeholder="例）東京都○○区○○4-5-6 ○○ビル3階">
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-accent" onclick="generate()">チェックリスト・聴取事項・請求書面を生成</button>
      <button class="btn btn-outline" onclick="window.print()">印刷 / PDF保存</button>
    </div>
  </div>

  <div id="result">
    <div class="card">
      <div id="summaryHead" style="margin-bottom:18px;font-size:.9rem;color:var(--muted)"></div>

      <div class="result-section">
        <h2>離婚事件で決めるべき7項目の整理</h2>
        <table class="points">
          <thead><tr><th>項目</th><th>方針・請求内容</th></tr></thead>
          <tbody id="pointsBody"></tbody>
        </table>
      </div>

      <div class="result-section">
        <h2>必要書類・資料チェックリスト</h2>
        <ul class="checklist" id="docList"></ul>
      </div>

      <div class="result-section">
        <h2>依頼者への聴取事項（ヒアリングシート）</h2>
        <ul class="qa" id="qaList"></ul>
      </div>

      <div class="result-section">
        <h2>法的見通し（依頼者説明・内部検討用メモ）</h2>
        <div class="btn-row" style="margin:0 0 12px">
          <button class="btn btn-outline" onclick="copyArea('memoOut')">本文をコピー</button>
        </div>
        <textarea id="memoOut" readonly></textarea>
      </div>

      <div class="result-section">
        <h2>相手方への受任通知・初回請求書面（ドラフト）</h2>
        <div class="btn-row" style="margin:0 0 12px">
          <button class="btn btn-outline" onclick="copyArea('letterOut')">本文をコピー</button>
        </div>
        <textarea id="letterOut" readonly></textarea>
      </div>
    </div>
  </div>

</div>

<script>
document.getElementById('separation').addEventListener('change', function(){
  document.getElementById('separationDateWrap').style.display = this.value === 'separated' ? 'block' : 'none';
});
document.getElementById('hasChildren').addEventListener('change', function(){
  document.getElementById('childrenCountWrap').style.display = this.value === 'yes' ? 'block' : 'none';
});

function checked(issue){
  return document.querySelector('input[data-issue="'+issue+'"]').checked;
}

function generate(){
  const clientName = document.getElementById('clientName').value || '依頼者';
  const spouseName = document.getElementById('spouseName').value || '相手方';
  const separated = document.getElementById('separation').value === 'separated';
  const hasChildren = document.getElementById('hasChildren').value === 'yes';

  const docs = new Set();
  const qas = [];

  // ベース（全件共通）
  docs.add('戸籍謄本（夫婦・子の記載があるもの）');
  docs.add('住民票（依頼者・相手方）');
  docs.add('依頼者の本人確認書類（運転免許証・マイナンバーカード等）');
  docs.add('婚姻関係を裏付ける資料（結婚式・婚姻届の写し等、あれば）');

  qas.push('結婚の経緯と、婚姻期間中の生活状況を教えてください。');
  qas.push('離婚を考えるに至った主な経緯・きっかけは何ですか。');
  qas.push('現在、相手方とは話し合いができる関係ですか（連絡可能か、弁護士が入ることへの反応等）。');
  qas.push('離婚の方針として、まず協議・調停・訴訟のどれを希望しますか。');

  if (separated) {
    docs.add('別居の経緯・別居開始日を示す資料（賃貸契約書、転居の記録等）');
    qas.push('別居開始日と、別居に至った経緯を教えてください。');
    qas.push('別居後の生活費（婚姻費用）の負担状況はどうなっていますか。');
  } else {
    qas.push('現在同居中ですが、今後別居の予定はありますか（時期・方法）。');
  }

  if (hasChildren) {
    docs.add('子の戸籍謄本・住民票（同居の有無を示す資料）');
    qas.push('お子様の現在の年齢・就学状況・健康状態を教えてください。');
    qas.push('お子様は現在どちらと同居していますか。');
  }

  if (checked('infidelity')) {
    docs.add('不貞行為を示す証拠（写真・LINE等のメッセージ履歴・ホテルの利用記録・興信所調査報告書等）');
    qas.push('不貞行為が発覚した経緯と時期、相手の素性が分かる情報を教えてください。');
    qas.push('不貞行為を示す証拠（メッセージ、写真等）をすでにお持ちですか。');
  }

  if (checked('dv')) {
    docs.add('DV・モラハラを示す証拠（診断書、写真、録音・録画データ、医療機関の受診記録等）');
    docs.add('警察への相談・通報記録（あれば、相談票の写し等）');
    qas.push('DV・モラハラの内容、発生時期・頻度・最近の状況を具体的に教えてください。');
    qas.push('警察や医療機関に相談・受診したことはありますか。');
    qas.push('現在、身の安全について不安はありますか（保護命令の検討要否）。');
  }

  if (checked('abandonment')) {
    docs.add('生活費の不払いを示す資料（給与明細、振込記録、督促のやり取り等）');
    qas.push('生活費が支払われなくなった時期と、その後の経緯を教えてください。');
  }

  if (checked('addiction')) {
    qas.push('問題行動（暴力・ギャンブル・アルコール等）の具体的な内容と頻度、これまでの対応を教えてください。');
  }

  if (checked('custody')) {
    qas.push('親権について、相手方の意向や監護に関する不安要素（虐待歴、養育環境等）はありますか。');
    qas.push('現在の主たる監護者は誰ですか（保育園・学校への送迎、看病等の実績）。');
  }

  if (checked('visitation')) {
    qas.push('面会交流について、希望する頻度・方法、注意すべき事情（DV歴等）はありますか。');
  }

  if (checked('support')) {
    docs.add('依頼者・相手方双方の収入を示す資料（給与明細、源泉徴収票、確定申告書等）');
    qas.push('養育費の算定に必要な、依頼者・相手方双方の年収・就労状況を教えてください。');
    qas.push('希望する養育費の金額・支払方法（一括/分割）はありますか。');
  }

  if (checked('realestate')) {
    docs.add('不動産の登記簿謄本（全部事項証明書）・固定資産評価証明書');
    docs.add('不動産の購入時の契約書・ローン残高証明書');
    qas.push('不動産（自宅等）の名義、購入時期・購入資金の出どころ、ローン残高を教えてください。');
    qas.push('不動産の処分（売却・どちらかが住み続ける等）についてご希望はありますか。');
  }

  if (checked('savings')) {
    docs.add('預貯金口座の取引履歴・残高証明書（婚姻時・別居時・現在）');
    docs.add('証券・保険等の資産を示す資料');
    qas.push('依頼者・相手方名義の預貯金、証券、保険等の資産状況（婚姻時・別居時点）を教えてください。');
  }

  if (checked('debt')) {
    docs.add('債務に関する資料（ローン契約書、借入残高がわかる書面等）');
    qas.push('夫婦の生活のために生じた債務（ローン・借金）の内容と残額を教えてください。');
  }

  if (checked('business')) {
    docs.add('事業用資産・決算書・確定申告書（自営業・会社経営の場合）');
    qas.push('事業・会社の資産（株式・出資、事業用不動産等）の状況を教えてください。');
  }

  if (checked('pension')) {
    docs.add('年金分割のための情報通知書（年金事務所で取得）');
    qas.push('年金分割の対象となる年金（厚生年金等）の加入状況を確認できますか。');
  }

  if (checked('alimony')) {
    qas.push('慰謝料を請求する根拠となる事実（不貞・DV等）と、被った精神的苦痛の内容を具体的に教えてください。');
    qas.push('希望する慰謝料の金額の目安はありますか。');
  }

  if (checked('negotiation')) {
    qas.push('協議離婚を進める場合、相手方との連絡方法（直接/代理人経由）に希望はありますか。');
  }

  if (checked('mediation')) {
    docs.add('調停申立てに必要な事情説明書記載事項の整理メモ');
    qas.push('調停を申し立てる場合、希望する管轄裁判所（相手方の住所地等）を確認できますか。');
  }

  if (checked('litigation')) {
    qas.push('訴訟になった場合の主張立証の見通しについて、現時点で把握している証拠関係を教えてください。');
  }

  if (checked('urgent')) {
    qas.push('緊急性の高い事情（身の安全、子の引渡し等）があれば、最優先で対応すべき点を教えてください。');
  }

  // --- 付随情報の取得 ---
  const spouseAddress = document.getElementById('spouseAddress').value || '（送付先住所未記入）';
  const replyDays = document.getElementById('replyDays').value || '14';
  const livingExpenseAmount = document.getElementById('livingExpenseAmount').value;
  const childSupportAmount = document.getElementById('childSupportAmount').value;
  const alimonyAmount = document.getElementById('alimonyAmount').value;
  const propertyDivisionNote = document.getElementById('propertyDivisionNote').value;
  const firmName = document.getElementById('firmName').value || '○○法律事務所';
  const lawyerName = document.getElementById('lawyerName').value || '弁護士　○○　○○';
  const firmContact = document.getElementById('firmContact').value || 'TEL ○○-○○○○-○○○○';
  const firmAddress = document.getElementById('firmAddress').value || '（事務所住所未記入）';
  const today = new Date().toLocaleDateString('ja-JP');

  const hasFaultGround = checked('infidelity') || checked('dv') || checked('abandonment') || checked('addiction') || checked('mental');
  const hasProperty = checked('realestate') || checked('savings') || checked('debt') || checked('business');
  const wantsAlimony = checked('alimony') || checked('infidelity') || checked('dv');

  // --- ① 7項目サマリー ---
  const points = [];
  points.push(['⑴ 離婚するか',
    '依頼者は離婚を求める方針。' + (hasFaultGround ? '法定離婚原因（5号「その他婚姻を継続し難い重大な事由」等）の主張を検討。' : '主たる原因事実が明確でないため、まずは協議離婚を試み、不成立の場合は調停を検討。')]);
  points.push(['⑵ 婚姻費用',
    separated ? '別居中のため、合意又は調停で婚姻費用の分担を確保する必要あり。' + (livingExpenseAmount ? '依頼者希望額：月額' + livingExpenseAmount + '。' : '算定表に基づき希望額を確認予定。') : '同居中のため現時点では婚姻費用の問題は生じないが、別居開始時は別途検討。']);
  points.push(['⑶ 養育費',
    hasChildren ? (checked('support') ? '養育費の取り決めが必要。算定表を基準に協議。' + (childSupportAmount ? '依頼者希望額：月額' + childSupportAmount + '。' : '') : '子はいるが養育費の取り決め要否を依頼者に確認する必要あり。') : '未成年の子がいないため対象外。']);
  points.push(['⑷ 財産分与',
    hasProperty ? '対象財産（不動産・預貯金・債務等）の開示を受け、2分の1ルールを原則に分与方法を検討。' + (propertyDivisionNote ? '依頼者希望：' + propertyDivisionNote + '。' : '') : '現時点で分与対象となる財産の報告がないため、財産開示の聴取が必要。']);
  points.push(['⑸ 慰謝料',
    wantsAlimony ? '不貞・DV等の事実関係及び証拠の有無を精査の上、相当額を算定し請求。' + (alimonyAmount ? '依頼者希望額：' + alimonyAmount + '。' : '') : '現時点で慰謝料請求の根拠となる事実の申告なし。聴取により要否を再確認。']);
  points.push(['⑹ 年金分割',
    checked('pension') ? '年金分割（合意分割）を希望。年金事務所で情報通知書を取得し、分割割合（原則0.5）を協議。' : '年金分割の希望の有無を確認する必要あり。']);
  points.push(['⑺ 親権',
    hasChildren ? (checked('custody') ? '親権について争いが生じる可能性あり。主たる監護者・監護の継続性・子の意思等を踏まえて主張を構成。' : '親権について争いは想定されていないが、念のため監護状況を確認。') : '未成年の子がいないため対象外。']);

  const pointsBody = document.getElementById('pointsBody');
  pointsBody.innerHTML = '';
  points.forEach(p=>{
    const tr = document.createElement('tr');
    const th = document.createElement('th');
    th.textContent = p[0];
    const td = document.createElement('td');
    td.textContent = p[1];
    tr.appendChild(th); tr.appendChild(td);
    pointsBody.appendChild(tr);
  });

  // --- ② 出力ヘッダ ---
  document.getElementById('summaryHead').textContent =
    '依頼者：' + clientName + ' ／ 相手方：' + spouseName +
    ' ／ ' + (separated ? '別居中' : '同居中') +
    ' ／ 未成年の子：' + (hasChildren ? 'あり' : 'なし') +
    ' ／ 作成日：' + today;

  const docList = document.getElementById('docList');
  docList.innerHTML = '';
  [...docs].forEach(d=>{
    const li = document.createElement('li');
    li.textContent = d;
    docList.appendChild(li);
  });

  const qaList = document.getElementById('qaList');
  qaList.innerHTML = '';
  qas.forEach(q=>{
    const li = document.createElement('li');
    li.textContent = q;
    qaList.appendChild(li);
  });

  // --- ③ 法的見通しメモ ---
  const memoLines = [];
  memoLines.push('【法的見通し検討メモ（依頼者説明・内部検討用）】');
  memoLines.push('作成日：' + today);
  memoLines.push('依頼者：' + clientName + '　／　相手方：' + spouseName);
  memoLines.push('');
  memoLines.push('■ 離婚原因の見通し');
  if (hasFaultGround) {
    const grounds = [];
    if (checked('infidelity')) grounds.push('不貞行為（民法770条1項1号）');
    if (checked('dv')) grounds.push('DV・モラハラ（同項5号「その他婚姻を継続し難い重大な事由」）');
    if (checked('abandonment')) grounds.push('悪意の遺棄（同項2号）');
    if (checked('addiction')) grounds.push('問題行動の常習性（同項5号該当の余地）');
    if (checked('mental')) grounds.push('強度の精神病その他重大事由（同項4号・5号）');
    memoLines.push('主張可能な法定離婚原因として、' + grounds.join('、') + 'が想定される。ただし、いずれも立証（証拠）の充実度により認定の確度が変わるため、客観的証拠（メッセージ、写真、診断書、第三者証言等）の収集状況を確認の上、立証方針を確定する必要がある。');
    if (checked('infidelity')) memoLines.push('不貞については、性的関係を直接・間接に推認させる証拠（宿泊記録、メッセージ内容等）の有無が立証上の最大のポイントとなる。');
    if (checked('dv')) memoLines.push('DV・モラハラについては、診断書・写真・録音等の客観的資料に加え、発生頻度・継続性を示す記録（日記、相談記録等）の有無を確認する。身の安全に懸念がある場合は保護命令の要否も併せて検討する。');
  } else {
    memoLines.push('現時点で申告された事情からは法定離婚原因に直結する事実は明確でなく、性格の不一致等を理由とする協議離婚を基本線とする。相手方が離婚に同意しない場合は、調停を経て、訴訟においては「婚姻を継続し難い重大な事由」の主張立証が必要となる見通し。');
  }
  memoLines.push('');
  memoLines.push('■ 婚姻費用・養育費の見通し');
  if (separated) {
    memoLines.push('別居中であるため、離婚成立までの間、婚姻費用分担請求（民法752条、家事事件手続法）が可能。標準的算定方式（簡易算定表）により、双方の年収・子の数・年齢を基礎に算定される。' + (livingExpenseAmount ? '依頼者希望額（月額' + livingExpenseAmount + '）との整合性は、双方の収入資料確認後に検証する。' : '依頼者・相手方双方の収入資料の確認が先決事項となる。'));
  } else {
    memoLines.push('現時点で別居していないため婚姻費用の問題は生じていないが、別居開始と同時に分担請求権が発生する点を依頼者に説明済みとする。');
  }
  if (hasChildren) {
    memoLines.push('養育費についても標準算定方式に基づく算定が原則であり、' + (checked('custody') ? '親権・監護権の帰属先によって算定の前提（監護親・非監護親）が変動する。' : '親権者を依頼者とする前提で算定するのが現時点の方針となる。'));
  }
  memoLines.push('');
  memoLines.push('■ 財産分与の見通し');
  if (hasProperty) {
    memoLines.push('財産分与は、婚姻中に形成された財産を対象に、原則2分の1の割合で分与するのが裁判実務上の原則（最高裁判例の考え方に準拠）。特有財産（婚姻前の財産・相続財産等）に該当する部分は対象外となるため、取得時期・原資の確認が必要。' + (checked('debt') ? '債務についても財産分与の清算的要素として考慮する必要があり、生活費に起因する債務かどうかを精査する。' : '') + (checked('business') ? '事業用資産・会社株式が存在する場合、評価方法（純資産方式等）について専門的検討が必要となる可能性がある。' : ''));
  } else {
    memoLines.push('現時点で対象となる財産の報告がなく、財産分与の見通しを立てるには、依頼者・相手方双方の財産状況（不動産、預貯金、保険、債務等）の聴取・開示が必要。');
  }
  memoLines.push('');
  memoLines.push('■ 慰謝料の見通し');
  if (wantsAlimony) {
    memoLines.push('離婚慰謝料の相場は事案の内容（不貞の期間・態様、DVの程度等）により大きく異なり、一般的には数十万円～300万円程度の範囲で認定される例が多い。' + (alimonyAmount ? '依頼者希望額（' + alimonyAmount + '）は、相場感や証拠の充実度を踏まえて協議・調停の場で柔らかく主張する方針とし、相手方の反応を見て調整する。' : '具体的な希望額は証拠関係を踏まえて改めて協議する。'));
  } else {
    memoLines.push('現時点で慰謝料請求の根拠となる具体的事実の申告がないため、請求の要否について改めて聴取の上判断する。');
  }
  memoLines.push('');
  memoLines.push('■ 年金分割の見通し');
  memoLines.push(checked('pension') ? '厚生年金等の保険料納付実績がある場合、合意分割（原則0.5）の対象となる。年金事務所で「年金分割のための情報通知書」を取得し、分割対象期間・按分割合を確定させる必要がある。' : '年金分割の希望や年金加入状況が未確認のため、依頼者に確認の上、必要に応じて情報通知書を取得する。');
  memoLines.push('');
  memoLines.push('■ 親権の見通し');
  if (hasChildren) {
    memoLines.push(checked('custody') ? '親権が争点となる場合、実務上は「主たる監護者」「監護の継続性」「子の意思（年齢相応）」「監護環境の安定性」等を総合的に考慮して判断される。現時点の監護状況（誰が日常的な世話をしているか）の整理が主張構成上重要となる。' : '現時点では親権について争いは想定されないが、相手方の対応によっては争点化する可能性もあるため、監護実績の記録化を依頼者に助言する。');
  } else {
    memoLines.push('未成年の子がいないため親権の問題は生じない。');
  }
  memoLines.push('');
  memoLines.push('■ 進行方針');
  if (checked('urgent')) {
    memoLines.push('身の安全等緊急性の高い事情があるため、保護命令の申立てや別居の支援（シェルター等の情報提供）を優先的に検討する。');
  }
  if (checked('litigation')) {
    memoLines.push('協議・調停が不成立となった場合は訴訟移行を想定し、立証計画（証拠収集・主張整理）を早期に準備する。');
  } else if (checked('mediation')) {
    memoLines.push('調停を中心に進める方針。家庭裁判所の管轄・申立書類の準備を進める。');
  } else {
    memoLines.push('まずは受任通知の送付による協議から開始し、相手方の対応を見て調停移行の要否を判断する。');
  }
  memoLines.push('');
  memoLines.push('※本メモは聴取段階の限られた情報に基づく一般的な見通しであり、証拠関係の精査・追加の聴取結果により結論が変わり得る暫定的な検討メモである。');

  document.getElementById('memoOut').value = memoLines.join('\n');

  // --- ④ 受任通知・初回請求書面ドラフト ---
  const letterLines = [];
  letterLines.push(today);
  letterLines.push('');
  letterLines.push(spouseAddress);
  letterLines.push(spouseName + '　様');
  letterLines.push('');
  letterLines.push(firmAddress);
  letterLines.push(firmName);
  letterLines.push(lawyerName);
  letterLines.push(firmContact);
  letterLines.push('');
  letterLines.push('　　　　　　　　　　　　　　　　通　知　書');
  letterLines.push('');
  letterLines.push('前略　突然のご連絡となり恐縮ですが、当職は、貴殿の配偶者である' + clientName + '様（以下「依頼者」といいます。）より、貴殿との離婚に関する件につき委任を受けましたので、本書面をもってご通知申し上げます。');
  letterLines.push('今後、本件に関するご連絡・お問い合わせは、依頼者本人ではなく、下記当職宛にいただきますようお願い申し上げます。');
  letterLines.push('');
  letterLines.push('第1　離婚の請求');
  letterLines.push('依頼者は、貴殿との離婚を求めます。');
  letterLines.push('');

  let sec = 2;
  if (separated) {
    letterLines.push('第' + sec + '　婚姻費用の分担');
    letterLines.push('依頼者は現在貴殿と別居しておりますので、離婚成立に至るまでの間の婚姻費用の分担を求めます。' + (livingExpenseAmount ? '具体的には、月額' + livingExpenseAmount + 'を目安とした分担をお願いいたします。' : '標準算定方式に基づく適正額について、双方の収入資料を踏まえてご回答ください。'));
    letterLines.push('');
    sec++;
  }
  if (hasChildren) {
    letterLines.push('第' + sec + '　養育費');
    letterLines.push('お子様の養育費につきましては、標準算定方式を踏まえ、' + (childSupportAmount ? '月額' + childSupportAmount + 'を目安として協議させていただきたく存じます。' : '双方の年収等の資料を確認した上で、改めて具体的な金額をご提案いたします。'));
    letterLines.push('');
    sec++;
  }
  letterLines.push('第' + sec + '　財産分与');
  letterLines.push('婚姻中に形成された財産（不動産、預貯金、保険、その他資産及び債務）につきまして、財産分与のご協議をお願いいたします。' + (propertyDivisionNote ? '依頼者としては、' + propertyDivisionNote + 'を希望しております。' : '貴殿が把握している財産の開示についてもご協力をお願いいたします。'));
  letterLines.push('');
  sec++;
  if (wantsAlimony) {
    letterLines.push('第' + sec + '　慰謝料');
    letterLines.push('依頼者は、本件離婚に至る事情により多大な精神的苦痛を受けております。これにつき、慰謝料として' + (alimonyAmount ? alimonyAmount : '相当額') + 'のお支払いを求めます。');
    letterLines.push('');
    sec++;
  }
  if (checked('pension')) {
    letterLines.push('第' + sec + '　年金分割');
    letterLines.push('年金分割（合意分割）の手続につきましても、原則どおりの割合（0.5）にて分割することにご同意いただきますようお願いいたします。');
    letterLines.push('');
    sec++;
  }
  if (hasChildren) {
    letterLines.push('第' + sec + '　親権');
    letterLines.push('お子様の親権につきましては、依頼者が取得することを希望いたします。' + (checked('custody') ? 'この点につきご異論がある場合には、現在の監護状況等を踏まえ、改めて協議させていただきたく存じます。' : ''));
    letterLines.push('');
    sec++;
  }

  letterLines.push('以上の各事項につきまして、本書面到達後' + replyDays + '日以内に、当職宛にご回答くださいますようお願い申し上げます。');
  letterLines.push('期間内に誠意あるご回答をいただけない場合には、家庭裁判所への調停申立て等、法的手続に移行させていただく場合がございますので、あらかじめご了承おきください。');
  letterLines.push('');
  letterLines.push('草々');

  document.getElementById('letterOut').value = letterLines.join('\n');

  document.getElementById('result').style.display = 'block';
  document.getElementById('result').scrollIntoView({behavior:'smooth'});
}

function copyArea(id){
  const el = document.getElementById(id);
  el.select();
  document.execCommand('copy');
}
</script>

</body>
</html>
